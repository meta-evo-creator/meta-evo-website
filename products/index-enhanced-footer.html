    <script>
        // 语言切换功能
        function switchLanguage(lang) {
            const buttons = document.querySelectorAll('.lang-btn');
            buttons.forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent === (lang === 'zh-CN' ? '中文' : 'English')) {
                    btn.classList.add('active');
                }
            });
            
            // 存储语言偏好
            localStorage.setItem('metaEvoLang', lang);
            
            // 显示切换提示
            alert(`已切换到${lang === 'zh-CN' ? '中文' : 'English'}，完整语言切换功能正在完善中`);
        }
        
        // 页面加载完成
        document.addEventListener('DOMContentLoaded', function() {
            console.log('✅ MetaEvo产品页面 - 世界顶尖级设计加载完成');
            
            // 设置初始语言
            const savedLang = localStorage.getItem('metaEvoLang') || 'zh-CN';
            const buttons = document.querySelectorAll('.lang-btn');
            buttons.forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent === (savedLang === 'zh-CN' ? '中文' : 'English')) {
                    btn.classList.add('active');
                }
            });
            
            // 平滑滚动
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function(e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('href');
                    if (targetId === '#') return;
                    
                    const targetElement = document.querySelector(targetId);
                    if (targetElement) {
                        targetElement.scrollIntoView({
                            behavior: 'smooth',
                            block: 'start'
                        });
                    }
                });
            });
            
            // 动画效果
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('fade-in');
                    }
                });
            }, observerOptions);
            
            // 观察所有技能卡片
            document.querySelectorAll('.skill-card').forEach(card => {
                observer.observe(card);
            });
        });
    </script>
