        // 璇█鍒囨崲鍔熻兘
        function switchLanguage(lang) {
            const buttons = document.querySelectorAll('.lang-btn');
            buttons.forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent === (lang === 'zh-CN' ? '涓枃' : 'English')) {
                    btn.classList.add('active');
                }
            });
            
            // 瀛樺偍璇█鍋忓ソ
            localStorage.setItem('metaEvoLang', lang);
            
            // 鏄剧ず鍒囨崲鎻愮ず
            alert(`宸插垏鎹㈠埌${lang === 'zh-CN' ? '涓枃' : 'English'}锛屽畬鏁磋瑷€鍒囨崲鍔熻兘姝ｅ湪瀹屽杽涓璥);
        }
        
        // 椤甸潰鍔犺浇瀹屾垚
        document.addEventListener('DOMContentLoaded', function() {
            console.log('鉁?MetaEvo鍏充簬椤甸潰 - 涓栫晫椤跺皷绾ц璁″姞杞藉畬鎴?);
            
            // 璁剧疆鍒濆璇█
            const savedLang = localStorage.getItem('metaEvoLang') || 'zh-CN';
            const buttons = document.querySelectorAll('.lang-btn');
            buttons.forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent === (savedLang === 'zh-CN' ? '涓枃' : 'English')) {
                    btn.classList.add('active');
                }
            });
            
            // 骞虫粦婊氬姩
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function(e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('href');
                    if (targetId === '#') return;
                    
                    const targetElement = document.querySelector(targetId);
                    if (targetElement) {
                        targetElement.scrollIntoView({
                            behavior: 'smooth',
                            block: 'start'
                        });
                    }
                });
            });
            
            // 鏃堕棿绾垮姩鐢?            const timelineItems = document.querySelectorAll('.timeline-item');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.opacity = '1';
                        entry.target.style.transform = 'translateX(0)';
                    }
                });
            }, { threshold: 0.1 });
            
            timelineItems.forEach((item, index) => {
                item.style.opacity = '0';
                item.style.transform = 'translateX(-20px)';
                item.style.transition = `opacity 0.5s ease ${index * 0.1}s, transform 0.5s ease ${index * 0.1}s`;
                observer.observe(item);
            });
        });
    </script>
